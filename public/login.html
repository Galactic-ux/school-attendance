<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="bg-gradient-to-b from-indigo-900 to-blue-900 min-h-screen flex items-center justify-center text-white">
  <div class="max-w-md w-full bg-white/5 p-8 rounded-2xl shadow-lg border border-white/10">
    <h1 class="text-2xl font-semibold mb-4">Attendance System</h1>
    <input id="username" placeholder="Username" class="w-full p-3 rounded mb-3 bg-white/10 text-white" />
    <input id="password" type="password" placeholder="Password" class="w-full p-3 rounded mb-4 bg-white/10 text-white" />
    <div class="flex gap-3">
      <button id="loginBtn" class="flex-1 py-3 rounded bg-indigo-500 text-white">Login</button>
    </div>
    <p id="err" class="text-red-300 mt-3"></p>
  </div>

<script>
async function doLogin(username,password){
  const res = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  if(!res.ok) {
    const err = await res.json().catch(()=>({error:'Login failed'}));
    throw new Error(err.error || 'Login failed');
  }
  return res.json();
}

document.getElementById('loginBtn').onclick = async ()=>{
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  try{
    const data = await doLogin(u,p);
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', data.role);
    if(data.linkedStudentId) localStorage.setItem('linkedStudentId', data.linkedStudentId);
    if(data.role === 'student') window.location.href = '/student.html';
    else if(data.role === 'faculty') window.location.href = '/faculty.html';
    else window.location.href = '/admin.html';
  }catch(e){ document.getElementById('err').innerText = e.message; }
};
</script>
</body>
</html>
